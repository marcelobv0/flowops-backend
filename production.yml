volumes:
  production_postgres_data: {}
  production_postgres_data_backups: {}
  production_caddy: {}
  production_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    image: dtax-backend_production_django
    depends_on:
      - postgres
      - redis
      # - pgbouncer
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    command: postgres -c max_connections=200
    image: dtax-backend_production_postgres
    volumes:
      - production_postgres_data:/var/lib/postgresql/data
      - production_postgres_data_backups:/backups
    env_file:
      - ./.envs/.production/.postgres
    ports:
      - "5432:5432"
    expose:
      - "5432"


  # pgbouncer:
  #   image: bitnami/pgbouncer:latest
  #   depends_on:
  #    - postgres
  #   env_file:
  #    - ./.envs/.production/.pgbouncer
  #   expose:
  #   - "5432"

  caddy:
    build:
      context: .
      dockerfile: ./compose/production/caddy/Dockerfile
    image: dtax-backend_production_caddy
    depends_on:
      - django
    volumes:
      - production_caddy:/data
    env_file:
      - ./.envs/.production/.caddy
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"

  redis:
    image: redis:7-alpine
    volumes:
      - production_redis_data:/data
    command: redis-server --appendonly yes

  celeryworker:
    <<: *django
    mem_limit: 2g
    memswap_limit: 2g
    image: dtax-backend_production_celeryworker
    depends_on:
      - redis
      - postgres
    command: /start-celeryworker

  # celerybeat:
  #   <<: *django
  #   image: dtax-backend_production_celerybeat
  #   depends_on:
  #     - redis
  #     - postgres
  #   command: /start-celerybeat

  flower:
    <<: *django
    image: dtax-backend_production_flower
    depends_on:
      - redis
    # Port 5555 is NOT exposed to the host. Flower is only reachable through
    # Caddy at /flower/, which enforces basic auth.
    command: /start-flower
    
